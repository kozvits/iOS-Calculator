<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1c1c1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Calculator" />
  <meta name="description" content="iOS Calculator Clone" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    }

    .calculator {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 0 env(safe-area-inset-bottom, 12px) 0;
    }

    /* ── Display ── */
    .display {
      padding: 0 24px 8px;
      text-align: right;
      flex-shrink: 0;
    }

    .display-expr {
      font-size: 20px;
      color: #636366;
      min-height: 28px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 2px;
    }

    .display-main {
      font-size: 80px;
      font-weight: 200;
      color: #fff;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: font-size 0.12s ease;
    }

    /* ── Button grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 16px 12px 12px;
      flex-shrink: 0;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 50%;
      font-family: inherit;
      font-size: 34px;
      font-weight: 400;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.06s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: transparent;
      transition: background 0.06s;
    }

    .btn:active::after { background: rgba(255,255,255,0.25); }

    /* Color variants */
    .btn-dark   { background: #333336; color: #fff; }
    .btn-gray   { background: #a5a5a5; color: #000; }
    .btn-orange { background: #ff9f0a; color: #fff; }
    .btn-orange.active { background: #fff; color: #ff9f0a; }

    /* Zero button spans 2 columns */
    .btn-zero {
      grid-column: span 2;
      border-radius: 40px;
      aspect-ratio: unset;
      justify-content: flex-start;
      padding-left: 28px;
    }

    /* Responsive: small phones */
    @media (max-height: 680px) {
      .display-main { font-size: 60px; }
      .grid { gap: 8px; padding: 12px 10px 8px; }
      .btn { font-size: 28px; }
    }

    @media (max-height: 580px) {
      .display-main { font-size: 48px; }
      .grid { gap: 6px; }
      .btn { font-size: 24px; }
    }

    /* Landscape */
    @media (orientation: landscape) and (max-height: 500px) {
      .calculator { flex-direction: row; align-items: flex-end; max-width: 100%; }
      .display { flex: 1; padding-bottom: 12px; }
      .grid { flex: 1.5; }
      .display-main { font-size: 48px; }
    }
  </style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="display-expr" id="expr"></div>
    <div class="display-main" id="main">0</div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
  // ── Button definitions ──────────────────────────────────────────────────────
  const BUTTONS = [
    { label: 'AC',  cls: 'btn-gray',   action: 'ac'      },
    { label: '+/-', cls: 'btn-gray',   action: 'sign'    },
    { label: '%',   cls: 'btn-gray',   action: 'percent' },
    { label: '÷',   cls: 'btn-orange', action: 'op', op: '/' },
    { label: '7',   cls: 'btn-dark',   action: 'digit'   },
    { label: '8',   cls: 'btn-dark',   action: 'digit'   },
    { label: '9',   cls: 'btn-dark',   action: 'digit'   },
    { label: '×',   cls: 'btn-orange', action: 'op', op: '*' },
    { label: '4',   cls: 'btn-dark',   action: 'digit'   },
    { label: '5',   cls: 'btn-dark',   action: 'digit'   },
    { label: '6',   cls: 'btn-dark',   action: 'digit'   },
    { label: '−',   cls: 'btn-orange', action: 'op', op: '-' },
    { label: '1',   cls: 'btn-dark',   action: 'digit'   },
    { label: '2',   cls: 'btn-dark',   action: 'digit'   },
    { label: '3',   cls: 'btn-dark',   action: 'digit'   },
    { label: '+',   cls: 'btn-orange', action: 'op', op: '+' },
    { label: '0',   cls: 'btn-dark btn-zero', action: 'digit' },
    { label: ',',   cls: 'btn-dark',   action: 'dot'     },
    { label: '=',   cls: 'btn-orange', action: 'eq'      },
  ];

  // ── State ───────────────────────────────────────────────────────────────────
  let state = {
    display:       '0',
    prev:          null,
    op:            null,
    waitingOperand: false,
    lastOp:        null,
    lastVal:       null,
    justEvaled:    false,
  };

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const mainEl = document.getElementById('main');
  const exprEl = document.getElementById('expr');
  const grid   = document.getElementById('grid');

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function fmt(n) {
    if (!isFinite(n) || isNaN(n)) return 'Ошибка';
    let s = parseFloat(n.toPrecision(10)).toString().replace('.', ',');
    if (s.length > 12) s = parseFloat(n.toExponential(4)).toString().replace('.', ',');
    return s;
  }

  function parseD(s) { return parseFloat(s.replace(',', '.')); }

  function setDisplay(val) {
    const s = String(val);
    const len = s.length;
    mainEl.style.fontSize = len > 11 ? '36px' : len > 8 ? '52px' : len > 6 ? '64px' : '80px';
    mainEl.textContent = s;
  }

  function calcResult(a, b, op) {
    switch (op) {
      case '/': return b === 0 ? NaN : a / b;
      case '*': return a * b;
      case '-': return a - b;
      case '+': return a + b;
      default:  return b;
    }
  }

  function clearOpHighlight() {
    document.querySelectorAll('.btn-orange').forEach(b => b.classList.remove('active'));
  }

  function highlightOp(op) {
    clearOpHighlight();
    const btn = document.querySelector(`.btn-orange[data-op="${op}"]`);
    if (btn) btn.classList.add('active');
  }

  function updateACLabel() {
    const btn = document.querySelector('[data-action="ac"]');
    if (!btn) return;
    btn.textContent = (state.display !== '0') ? 'C' : 'AC';
  }

  // ── Handlers ────────────────────────────────────────────────────────────────
  function handleDigit(d) {
    if (state.waitingOperand || state.justEvaled) {
      state.display = d;
      state.waitingOperand = false;
      state.justEvaled = false;
    } else {
      if (state.display === '0') state.display = d;
      else if (state.display.length < 12) state.display += d;
    }
    setDisplay(state.display);
  }

  function handleDot() {
    if (state.waitingOperand || state.justEvaled) {
      state.display = '0,';
      state.waitingOperand = false;
      state.justEvaled = false;
    } else if (!state.display.includes(',')) {
      state.display += ',';
    }
    setDisplay(state.display);
  }

  function handleOp(op) {
    const cur = parseD(state.display);
    if (state.op && !state.waitingOperand) {
      const res = calcResult(state.prev, cur, state.op);
      state.display = fmt(res);
      state.prev = res;
      setDisplay(state.display);
    } else {
      state.prev = cur;
    }
    state.op = op;
    state.lastOp = op;
    state.waitingOperand = true;
    state.justEvaled = false;
    exprEl.textContent = '';
    highlightOp(op);
  }

  function handleEq() {
    if (!state.op) return;
    const cur = parseD(state.display);
    const b = state.justEvaled ? (state.lastVal ?? cur) : cur;
    if (!state.justEvaled) state.lastVal = cur;
    const res = calcResult(state.prev, b, state.lastOp || state.op);
    state.prev = res;
    state.display = fmt(res);
    state.waitingOperand = true;
    state.justEvaled = true;
    setDisplay(state.display);
    exprEl.textContent = '';
    clearOpHighlight();
  }

  function handleAC() {
    if (state.display !== '0' && !state.waitingOperand) {
      state.display = '0';
      setDisplay('0');
    } else {
      state = {
        display: '0', prev: null, op: null,
        waitingOperand: false, lastOp: null, lastVal: null, justEvaled: false,
      };
      setDisplay('0');
      exprEl.textContent = '';
      clearOpHighlight();
    }
  }

  function handleSign() {
    if (state.display === '0') return;
    const n = -parseD(state.display);
    state.display = fmt(n);
    setDisplay(state.display);
  }

  function handlePercent() {
    const n = parseD(state.display) / 100;
    state.display = fmt(n);
    setDisplay(state.display);
  }

  // ── Build grid ───────────────────────────────────────────────────────────────
  BUTTONS.forEach(cfg => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + cfg.cls;
    btn.textContent = cfg.label;
    btn.dataset.action = cfg.action;
    if (cfg.op) btn.dataset.op = cfg.op;

    btn.addEventListener('click', () => {
      switch (cfg.action) {
        case 'digit':   handleDigit(cfg.label);  break;
        case 'dot':     handleDot();              break;
        case 'op':      handleOp(cfg.op);         break;
        case 'eq':      handleEq();               break;
        case 'ac':      handleAC();               break;
        case 'sign':    handleSign();             break;
        case 'percent': handlePercent();          break;
      }
      updateACLabel();
    });

    grid.appendChild(btn);
  });

  // ── Keyboard support ─────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if ('0123456789'.includes(e.key)) { handleDigit(e.key); updateACLabel(); }
    else if (e.key === '.' || e.key === ',') { handleDot(); updateACLabel(); }
    else if (e.key === '+') { handleOp('+'); updateACLabel(); }
    else if (e.key === '-') { handleOp('-'); updateACLabel(); }
    else if (e.key === '*') { handleOp('*'); updateACLabel(); }
    else if (e.key === '/') { e.preventDefault(); handleOp('/'); updateACLabel(); }
    else if (e.key === 'Enter' || e.key === '=') { handleEq(); updateACLabel(); }
    else if (e.key === 'Escape') { handleAC(); updateACLabel(); }
    else if (e.key === 'Backspace') {
      if (state.display.length > 1) state.display = state.display.slice(0, -1);
      else state.display = '0';
      setDisplay(state.display);
      updateACLabel();
    }
  });

  // ── Service Worker ───────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
