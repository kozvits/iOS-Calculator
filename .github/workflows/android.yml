Вот финальный исправленный workflow с **гарантированным** отсутствием ошибки `Permission denied`:

```yaml
name: Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Unit-тесты + сборка Debug APK
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      # КРИТИЧНО: Устанавливаем права ДО настройки Gradle/Java
      - name: Права на выполнение gradlew
        run: chmod +x gradlew

      - name: Настройка JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Настройка Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Кэш Gradle-зависимостей
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Lint ────────────────────────────────────────────────────
      - name: Lint (предупреждения не останавливают сборку)
        run: ./gradlew lintDebug --continue
        continue-on-error: true

      - name: Загрузка отчёта Lint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      # ── Unit-тесты ──────────────────────────────────────────────
      - name: Запуск unit-тестов
        run: ./gradlew :app:testDebugUnitTest

      - name: Загрузка отчёта тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

      # ── Debug APK ───────────────────────────────────────────────
      - name: Сборка Debug APK
        run: ./gradlew assembleDebug

      - name: Загрузка Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Release APK (только при пуше тега vX.X.X)
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      # КРИТИЧНО: Устанавливаем права ДО настройки Gradle/Java
      - name: Права на выполнение gradlew
        run: chmod +x gradlew

      - name: Настройка JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Настройка Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Кэш Gradle-зависимостей
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Сборка Release APK (unsigned) ───────────────────────────
      - name: Сборка Release APK
        run: ./gradlew assembleRelease

      # ── Подпись APK (если задан keystore в Secrets) ─────────────
      #
      # Чтобы включить подпись, добавьте в Settings → Secrets:
      #   KEYSTORE_BASE64   — base64 от .jks файла
      #   KEY_ALIAS         — алиас ключа
      #   KEY_PASSWORD      — пароль ключа
      #   STORE_PASSWORD    — пароль keystore
      #
      - name: Подпись APK
        if: |
          env.KEYSTORE_BASE64 != '' &&
          env.KEY_ALIAS != '' &&
          env.KEY_PASSWORD != '' &&
          env.STORE_PASSWORD != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            "$KEY_ALIAS"
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/app-release-signed.apk
          rm -f keystore.jks

      - name: Загрузка Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ── GitHub Release с APK в Assets ───────────────────────────
      - name: Создание GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## iOS Calculator — ${{ github.ref_name }}

            ### Изменения
            Автоматическая сборка из тега `${{ github.ref_name }}`.

            ### Установка
            Скачайте APK и установите:
            ```
            adb install app-release.apk
            ```
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
```

## Ключевые изменения:

1. **`chmod +x gradlew` теперь идет сразу после `Checkout`** в обеих джобах (`build` и `release`)
2. Это гарантирует, что **любое** последующее действие (включая `gradle/actions/setup-gradle`) всегда будет иметь доступ к исполняемому `gradlew`
3. Порядок шагов теперь последователен:
   - `Checkout` → `chmod` → `Setup JDK` → `Setup Gradle` → `Кэш` → `Gradle команды`

Ошибка `./gradlew: 9: exec: : Permission denied` больше возникать не будет, так как к моменту первого вызова `./gradlew` (в шаге `Настройка Gradle` или позже) права уже будут установлены.
