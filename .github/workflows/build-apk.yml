name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Prepare www folder (webDir for Capacitor)
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp sw.js www/
          cp -r icons www/

      - name: Add Capacitor Android platform
        run: npx cap add android
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/ios-calculator-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-calculator-apk
          path: artifacts/ios-calculator-debug.apk
          retention-days: 30

      - name: Get short SHA
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Build ${{ steps.sha.outputs.short }}"
          body: |
            ## iOS Calculator — автоматическая сборка

            **Коммит:** `${{ github.sha }}`
            **Ветка:** `${{ github.ref_name }}`
            **Дата:** ${{ github.event.head_commit.timestamp }}

            ### Установка APK
            1. Скачайте `ios-calculator-debug.apk`
            2. На Android: Настройки → Безопасность → Разрешить установку из неизвестных источников
            3. Откройте скачанный файл и установите
          files: artifacts/ios-calculator-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
